<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Dashboard — LyraForge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 700; }
    .biz-name { font-size: 14px; color: #94a3b8; }
    .tier-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: #0ea5e920; color: #0ea5e9; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    .range-toggle { display: flex; gap: 8px; margin-bottom: 24px; }
    .range-btn { padding: 7px 16px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .range-btn.active { background: #22c55e20; border-color: #22c55e; color: #22c55e; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; }
    .card-label { font-size: 11px; color: #64748b; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
    .card-value { font-size: 28px; font-weight: 700; }
    .sentiment-row { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
    .sentiment-group { text-align: center; }
    .sentiment-label { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .sentiment-val { font-size: 22px; font-weight: 700; }
    .s-positive { color: #22c55e; } .s-neutral { color: #94a3b8; } .s-negative { color: #ef4444; }
    .section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .calls-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; border: 1px solid #334155; }
    .calls-table th { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; padding: 10px 16px; text-align: left; border-bottom: 1px solid #334155; }
    .calls-table td { font-size: 13px; padding: 10px 16px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
    .calls-table tr:last-child td { border-bottom: none; }
    .empty-cell { text-align: center; color: #475569; font-style: italic; padding: 32px !important; }
    .s-pos { color: #22c55e; } .s-neu { color: #94a3b8; } .s-neg { color: #ef4444; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #1e293b; text-align: center; font-size: 12px; color: #475569; }
    .footer a { color: #64748b; text-decoration: none; }
    .footer a:hover { color: #94a3b8; }
    .error-state { text-align: center; padding: 80px 24px; }
    .error-state h2 { font-size: 20px; margin-bottom: 8px; color: #f8fafc; }
    .error-state p { color: #64748b; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">⚡ LyraForge</span>
      <span class="biz-name" id="biz-name"></span>
    </div>
    <span class="tier-badge" id="tier-badge" style="display:none"></span>
  </div>

  <div class="container" id="main-content" style="display:none">
    <div class="range-toggle" role="toolbar" aria-label="Date range">
      <button class="range-btn active" data-range="month">This Month</button>
      <button class="range-btn" data-range="30">Last 30 Days</button>
      <button class="range-btn" data-range="all">All Time</button>
    </div>
    <div class="cards">
      <div class="card"><div class="card-label">Calls</div><div class="card-value" id="card-calls">0</div></div>
      <div class="card"><div class="card-label">Minutes Used</div><div class="card-value" id="card-minutes">0</div></div>
      <div class="card"><div class="card-label">All-Time Calls</div><div class="card-value" id="card-alltime">0</div></div>
    </div>
    <div class="sentiment-row">
      <div class="sentiment-group"><div class="sentiment-label">Positive</div><div class="sentiment-val s-positive" id="s-positive">0</div></div>
      <div class="sentiment-group"><div class="sentiment-label">Neutral</div><div class="sentiment-val s-neutral" id="s-neutral">0</div></div>
      <div class="sentiment-group"><div class="sentiment-label">Negative</div><div class="sentiment-val s-negative" id="s-negative">0</div></div>
    </div>
    <div class="section-title">Recent Calls</div>
    <table class="calls-table" aria-label="Recent calls">
      <thead><tr><th>Date</th><th>Duration</th><th>Sentiment</th></tr></thead>
      <tbody id="calls-tbody"></tbody>
    </table>
    <div class="section-title" id="leads-title" style="margin-top:24px; display:none">Leads / Callbacks</div>
    <div id="leads-forward-note" style="display:none; color:#94a3b8; font-size:13px; background:#1e293b; border:1px solid #334155; border-radius:10px; padding:16px 20px;"></div>
    <table class="calls-table" id="leads-table" aria-label="Leads" style="display:none">
      <thead><tr><th>Date</th><th>Name</th><th>Phone</th><th>Reason</th></tr></thead>
      <tbody id="leads-tbody"></tbody>
    </table>
  </div>

  <div class="container" id="error-content" style="display:none">
    <div class="error-state">
      <h2>Dashboard unavailable</h2>
      <p>This dashboard link is invalid or has expired.</p>
    </div>
  </div>

  <div class="container">
    <div class="footer">
      Powered by <a href="https://lyraforge.com">LyraForge</a>
      &nbsp;·&nbsp;
      <a id="intake-link" href="#">Update your info</a>
    </div>
  </div>
  <script src="/js/dashboard.js"></script>
</body>
</html>
